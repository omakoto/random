<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STL Viewer</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #333;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #viewer-container {
        width: 100%;
        height: 100%;
      }
      #ui-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
      }
      .button {
        background-color: #444;
        color: white;
        border: 1px solid #666;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
        transition: background-color 0.2s;
      }
      .button:hover {
        background-color: #555;
      }
      #status {
        color: white;
        font-size: 12px;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewer-container"></div>
      <div id="ui-overlay">
        <label for="file-upload" class="button">Upload STL</label>
        <input type="file" id="file-upload" accept=".stl" style="display: none;" />
        <button id="toggle-view" class="button">Switch to Isometric</button>
        <div id="status">Ready</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
